<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/active_menu_design.css">
    <script src="https://code.jquery.com/jquery-3.5.0.js"></script>
</head>
<body>
ref: https://codepen.io/PSBlakemore/pen/avzvgO
<!--Create a menu tab-->
<div class="menu-tab">
    <div id="one"></div>
    <div id="two"></div>
    <div id="three"></div>
</div>

<!--Show it when active-->
<div class="menu-hide">
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Timetable</a></li>
            <li><a href="#">Course List</a></li>
            <li><a href="#">My account</a></li>
        </ul>
    </nav>
</div>

<!--Display the selection-->
<div id="display"></div>

<script>
    $(document).ready(function(){
        $('.menu-tab').click(function(){
            $('.menu-hide').toggleClass('show');
            $('.menu-tab').toggleClass('active');
        });
        $('a').click(function(){
            $('.menu-hide').removeClass('show');
            $('.menu-tab').removeClass('active');
        });
    });
    $("#display").load("timetable.html");
</script>

</body>
</html>
